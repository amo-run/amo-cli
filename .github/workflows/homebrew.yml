name: Publish to Homebrew Tap

on:
  release:
    types: [published, released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  # Main job: Update Homebrew tap using the marketplace action
  update-homebrew-tap:
    runs-on: ubuntu-latest
    # Skip prerelease versions for homebrew
    if: github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease)
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set version variable
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${{ github.event.release.tag_name }}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version set to: $VERSION"

      - name: Wait for release assets
        if: github.event_name == 'release'
        run: |
          echo "⏳ Waiting for release assets to be available..."
          VERSION=${{ steps.version.outputs.version }}
          
          # Wait up to 3 minutes for all assets to be available
          for i in {1..18}; do
            echo "Attempt $i/18: Checking release assets..."
            
            RELEASE_INFO=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION")
            ASSET_COUNT=$(echo "$RELEASE_INFO" | jq -r '.assets | length')
            
            if [ "$ASSET_COUNT" -ge 8 ]; then
              echo "✅ Found $ASSET_COUNT assets, proceeding..."
              break
            else
              echo "Found $ASSET_COUNT assets, waiting for more..."
              sleep 10
            fi
            
            if [ $i -eq 18 ]; then
              echo "❌ Timeout waiting for release assets"
              exit 1
            fi
          done

      - name: Update Homebrew Formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: amo
          homebrew-tap: amo-run/homebrew-amo
          base-branch: main
          commit-message: |
            amo {{version}}
            
            Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}
            
            Updated by GitHub Actions
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'

  # Optional job: Integration test on key platforms
  integration-test:
    needs: update-homebrew-tap
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
        include:
          - os: macos-14
            platform: "macOS"
          - os: ubuntu-latest
            platform: "Linux"
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Install Homebrew (Linux)
        if: runner.os == 'Linux'
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Wait for tap update
        run: |
          echo "⏳ Waiting for tap to be updated..."
          sleep 60

      - name: Test Homebrew Installation
        run: |
          echo "🧪 Testing installation from tap on ${{ matrix.platform }}..."
          
          # Add the tap
          brew tap amo-run/amo
          
          # Update tap to get latest formula
          brew update
          
          # Install amo
          brew install amo
          
          # Test basic functionality
          amo --version
          amo version
          amo tool list
          amo workflow list
          amo config ls
          
          echo "✅ Integration test passed on ${{ matrix.platform }}"

      - name: Test Core Features
        run: |
          echo "🔬 Testing core features on ${{ matrix.platform }}..."
          
          # Create a simple test workflow
          cat > test_simple.js << 'EOF'
          //!amo
          
          function main() {
              console.log("🔬 Simple integration test");
              
              // Test environment variable
              var platform = getVar("platform") || "unknown";
              console.log("Platform:", platform);
              
              // Test file system operations
              if (fs.exists(".")) {
                  console.log("✅ File system operations working");
              }
              
              return true;
          }
          
          main();
          EOF
          
          # Run the test workflow
          amo run test_simple.js --var platform=${{ matrix.platform }}
          
          echo "✅ Core features test passed on ${{ matrix.platform }}"

      - name: Cleanup
        if: always()
        run: |
          # Remove the tap to clean up
          brew untap amo-run/amo || true
