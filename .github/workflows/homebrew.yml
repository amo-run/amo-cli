name: Publish to Homebrew Tap

on:
  release:
    types: [published, released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip prerelease versions for homebrew
    if: github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease)
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4



      - name: Set variables
        id: vars
        run: |
          # Determine version from either workflow_dispatch input or release event
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            echo "📦 Using version from workflow_dispatch: $TAG"
          else
            TAG=${GITHUB_REF#refs/tags/}
            echo "📦 Using version from release event: $TAG"
          fi
          
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "version_without_v=${TAG#v}" >> $GITHUB_OUTPUT



      - name: Wait for release assets
        run: |
          echo "⏳ Waiting for release assets to be available..."
          VERSION="${{ steps.vars.outputs.version }}"
          
          # Wait up to 5 minutes for all assets to be available
          for i in {1..30}; do
            echo "Attempt $i/30: Checking release assets..."
            
            RELEASE_INFO=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION")
            ASSET_COUNT=$(echo "$RELEASE_INFO" | jq -r '.assets | length')
            
            if [ "$ASSET_COUNT" -ge 8 ]; then
              echo "✅ Found $ASSET_COUNT assets, proceeding..."
              break
            else
              echo "Found $ASSET_COUNT assets, waiting for more..."
              sleep 10
            fi
            
            if [ $i -eq 30 ]; then
              echo "❌ Timeout waiting for release assets"
              exit 1
            fi
          done

      - name: Get binary URLs and checksums
        id: binaries
        run: |
          # Get release information from GitHub API
          VERSION="${{ steps.vars.outputs.version }}"
          RELEASE_INFO=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION")
          
          # Extract download URLs for different platforms
          DARWIN_AMD64_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("darwin_amd64") and (.name | contains(".sha256") | not)) | .browser_download_url')
          DARWIN_ARM64_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("darwin_arm64") and (.name | contains(".sha256") | not)) | .browser_download_url')
          LINUX_AMD64_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("linux_amd64") and (.name | contains(".sha256") | not)) | .browser_download_url')
          LINUX_ARM64_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("linux_arm64") and (.name | contains(".sha256") | not)) | .browser_download_url')
          
          # Get SHA256 URLs
          DARWIN_AMD64_SHA256_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("darwin_amd64") and (.name | contains(".sha256"))) | .browser_download_url')
          DARWIN_ARM64_SHA256_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("darwin_arm64") and (.name | contains(".sha256"))) | .browser_download_url')
          LINUX_AMD64_SHA256_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("linux_amd64") and (.name | contains(".sha256"))) | .browser_download_url')
          LINUX_ARM64_SHA256_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("linux_arm64") and (.name | contains(".sha256"))) | .browser_download_url')
          
          # Download SHA256 files and extract checksums
          DARWIN_AMD64_SHA256=$(curl -s "$DARWIN_AMD64_SHA256_URL" | awk '{print $1}')
          DARWIN_ARM64_SHA256=$(curl -s "$DARWIN_ARM64_SHA256_URL" | awk '{print $1}')
          LINUX_AMD64_SHA256=$(curl -s "$LINUX_AMD64_SHA256_URL" | awk '{print $1}')
          LINUX_ARM64_SHA256=$(curl -s "$LINUX_ARM64_SHA256_URL" | awk '{print $1}')
          
          # Validate URLs and checksums
          if [ -z "$DARWIN_AMD64_URL" ] || [ -z "$DARWIN_ARM64_URL" ] || [ -z "$LINUX_AMD64_URL" ] || [ -z "$LINUX_ARM64_URL" ]; then
            echo "❌ Missing binary URLs"
            exit 1
          fi
          
          if [ -z "$DARWIN_AMD64_SHA256" ] || [ -z "$DARWIN_ARM64_SHA256" ] || [ -z "$LINUX_AMD64_SHA256" ] || [ -z "$LINUX_ARM64_SHA256" ]; then
            echo "❌ Missing SHA256 checksums"
            exit 1
          fi
          
          # Output for use in formula
          echo "darwin_amd64_url=$DARWIN_AMD64_URL" >> $GITHUB_OUTPUT
          echo "darwin_amd64_sha256=$DARWIN_AMD64_SHA256" >> $GITHUB_OUTPUT
          echo "darwin_arm64_url=$DARWIN_ARM64_URL" >> $GITHUB_OUTPUT
          echo "darwin_arm64_sha256=$DARWIN_ARM64_SHA256" >> $GITHUB_OUTPUT
          echo "linux_amd64_url=$LINUX_AMD64_URL" >> $GITHUB_OUTPUT
          echo "linux_amd64_sha256=$LINUX_AMD64_SHA256" >> $GITHUB_OUTPUT
          echo "linux_arm64_url=$LINUX_ARM64_URL" >> $GITHUB_OUTPUT
          echo "linux_arm64_sha256=$LINUX_ARM64_SHA256" >> $GITHUB_OUTPUT
          
          echo "✅ Binary URLs and checksums retrieved:"
          echo "  Darwin AMD64: $DARWIN_AMD64_URL"
          echo "  Darwin ARM64: $DARWIN_ARM64_URL"
          echo "  Linux AMD64: $LINUX_AMD64_URL"
          echo "  Linux ARM64: $LINUX_ARM64_URL"

      - name: Generate Formula
        run: |
          mkdir -p Formula
          cat > Formula/amo.rb << 'EOF'
          class Amo < Formula
            desc "CLI tool for managing tools and running JavaScript-based workflows"
            homepage "https://github.com/${{ github.repository }}"
            license "MIT"
            version "${{ steps.vars.outputs.version_without_v }}"

            on_macos do
              if Hardware::CPU.intel?
                url "${{ steps.binaries.outputs.darwin_amd64_url }}"
                sha256 "${{ steps.binaries.outputs.darwin_amd64_sha256 }}"
              elsif Hardware::CPU.arm?
                url "${{ steps.binaries.outputs.darwin_arm64_url }}"
                sha256 "${{ steps.binaries.outputs.darwin_arm64_sha256 }}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${{ steps.binaries.outputs.linux_amd64_url }}"
                sha256 "${{ steps.binaries.outputs.linux_amd64_sha256 }}"
              elsif Hardware::CPU.arm?
                url "${{ steps.binaries.outputs.linux_arm64_url }}"
                sha256 "${{ steps.binaries.outputs.linux_arm64_sha256 }}"
              end
            end

            def install
              # Install the pre-compiled binary
              bin.install Dir["*"].first => "amo"
            end

            test do
              system "#{bin}/amo", "--version"
              assert_match "amo v${{ steps.vars.outputs.version_without_v }}", shell_output("#{bin}/amo --version")
              
              # Test basic functionality
              system "#{bin}/amo", "version"
              system "#{bin}/amo", "tool", "list"
            end

            def caveats
              <<~EOS
                Getting started with amo:
                
                1. List available workflows:
                   amo workflow list
                
                2. Run a workflow:
                   amo run <workflow-name>
                
                3. Manage tools:
                   amo tool list
                
                4. Get help:
                   amo --help
                
                For more information, visit: https://github.com/${{ github.repository }}
              EOS
            end
          end
          EOF

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: amo-run/homebrew-amo
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-amo

      - name: Update formula in tap
        run: |
          # Copy the generated formula to the tap repository
          cp Formula/amo.rb homebrew-amo/Formula/amo.rb
          
          # Verify the formula syntax
          cd homebrew-amo
          brew audit --strict Formula/amo.rb || echo "Audit warnings found, but continuing..."

      - name: Commit and push to tap
        run: |
          cd homebrew-amo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Formula/amo.rb
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update amo formula to version ${{ steps.vars.outputs.version }}

            - Version: ${{ steps.vars.outputs.version }}
            - Uses pre-compiled binaries from GitHub releases
            - Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.vars.outputs.version }}
            
            Auto-generated by GitHub Actions"
            
            git push origin main
            echo "✅ Successfully updated Homebrew formula"
          fi

      - name: Verify installation (optional)
        if: true  # Disabled by default, enable for testing
        run: |
          # This step can be enabled for testing the formula
          brew tap amo-run/amo
          brew install amo
          amo --version
